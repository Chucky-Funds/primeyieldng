<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Feedback | PrimeYieldNG</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="shortcut icon" href="../favicon.png" type="image/x-icon">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- GSAP for Professional Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .gradient-dark {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        .glass-nav {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
        }

        /* Category Button Styling */
        .filter-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #e2e8f0;
        }

        .filter-btn.active {
            background-color: #fbbf24;
            border-color: #fbbf24;
            color: #0f172a;
            box-shadow: 0 4px 12px rgba(251, 191, 36, 0.3);
            transform: translateY(-2px);
        }

        /* Review Card Design */
        .review-card {
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .avatar-ring {
            width: 48px;
            height: 48px;
            border-radius: 99px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.875rem;
            border: 2px solid white;
            box-shadow: 0 0 0 2px #fbbf24;
        }

        /* Star Colors */
        .stars-excellent {
            color: #fbbf24;
        }

        .stars-moderate {
            color: #94a3b8;
        }

        .stars-critical {
            color: #ef4444;
        }

        @media (max-width: 320px) {
            .container {
                pxd: 4 !important;
            }

            h1 {
                font-size: 1.5rem !important;
            }
        }
    </style>
</head>

<!-- MAIN REVIEWS SECTION -->
<section class="py-12">
    <div class="container mx-auto px-6">

        <!-- Filter Bar -->
        <div class="flex flex-wrap justify-center gap-3 mb-12" id="filterBar">
            <button class="filter-btn active px-6 py-3 rounded-xl font-bold text-sm" onclick="filterReviews('all')">All
                Feedback</button>
            <button class="filter-btn px-6 py-3 rounded-xl font-bold text-sm" onclick="filterReviews('excellent')">★★★★★
                Excellent</button>
            <button class="filter-btn px-6 py-3 rounded-xl font-bold text-sm" onclick="filterReviews('moderate')">★★★☆☆
                Moderate</button>
            <button class="filter-btn px-6 py-3 rounded-xl font-bold text-sm" onclick="filterReviews('critical')">★☆☆☆☆
                Critical</button>
        </div>

        <!-- Reviews Grid -->
        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8" id="reviewsGrid">
            <!-- Cards injected via JS -->
        </div>

        <!-- Infinite Scroll Trigger (Sentinel) -->
        <div id="sentinel" class="h-20 w-full flex items-center justify-center mt-10">
            <div id="loader" class="flex space-x-2">
                <div class="w-3 h-3 bg-yellow-500 rounded-full animate-bounce"></div>
                <div class="w-3 h-3 bg-yellow-500 rounded-full animate-bounce [animation-delay:-0.15s]"></div>
                <div class="w-3 h-3 bg-yellow-500 rounded-full animate-bounce [animation-delay:-0.3s]"></div>
            </div>
            <p id="statusText" class="text-slate-500 font-medium hidden">End of record.</p>
        </div>
    </div>
</section>

            "Kabir", "King", "Omotola", "Ifunanya", "Fauziya", "Queen", "Oluchi", "Onyebuchi", "Yakubu", "Prince",
            "Abayomi", "Kachi", "Bilkisu", "Princess", "Dayo", "Adaeze", "Sanusi", "Marvelous", "Gbenga", "Okechukwu",

            "Osas", "Onyeka", "Farida", "Paul", "Efe", "Daberechi", "Wahab", "John", "Etinosa", "Kamara",
            "Monsurat", "James", "Ese", "Olanna", "Yusuf", "Andrew", "Oghogho", "Kainene", "Kareem", "Philip",
            "Uwaila", "Tobechukwu", "Titilayo", "Bartholomew", "Igho", "Lotachi", "Bisi", "Matthew", "Onome", "Olisa",
            "Remi", "Thomas", "Oghenekevwe", "Kamsi", "Sola", "Simon", "Ochuko", "Zara", "Kunle", "Jude",
            "Edidiong", "Davina", "Yemi", "Matthias", "Utibe", "Skylar", "Dapo", "Stephen", "Itoro", "Zion",
            "Wale", "Barnabas", "Imaobong", "Eliana", "Tunji", "Timothy", "Anietie", "Kosi", "Jide", "Titus",
            "Nsikak", "Jace", "Bassey", "Muna", "Effiong", "Dumebi", "Okon", "Somi", "Idorenyin", "Lotanna",
            "Kene", "Hassan", "Hussain", "Hamza", "Mustafa", "Zahra", "Khadeejah", "Salma", "Rukayat", "Sikiru",
            "Ganiyat", "Sulaimon", "Taofeek", "Rilwan", "Kazeem", "Rasheed", "Bilikisu", "Morufat", "Hafsat", "Abibat",
            "Adebayo", "Uchechi", "Sani", "Charity", "Babatunde", "Onyinye", "Mustapha", "Favor", "Oluwaseun", "Nnena",
            "Yahaya", "Damilola", "Chisome", "Deborah", "Olawale", "Ifeyinwa", "Mubarak", "Abigail", "Adewale", "Ogechi",
            "Bello", "Ijeoma", "Nasir", "Bukola", "Chidera", "Khadijat", "Wasiu", "Chiamaka", "Suraj", "Oluwakemi"

        ];

        const sources = {
            excellent: [
                { t: "10% ROI is Real", d: "I was skeptical about the daily 10%, but PrimeYieldNG has proven me wrong. My ₦100k doubled in 20 days exactly." },
                { t: "Institutional Standard", d: "The dashboard and the payout speed are world-class. No other NG comes close to this level of transparency." },
                { t: "Life Changer", d: "This lending cycle has helped me pay my kids' school fees. Thank you PrimeYieldNG." },
                { t: "Verified Payout", d: "Received my 2x maturation bonus directly to my bank. No hidden fees or stories." },
                { t: "Best Passive Income", d: "I've tried many platforms, but the consistency of the 10% daily return here is unmatched. It's my most reliable side hustle." },
                { t: "Business Expansion", d: "The quick turnaround of the 20-day cycle allowed me to reYield and double my boutique inventory in less than a month." },
                { t: "Top-Tier Support", d: "Had a small issue with my bank details, and the support team resolved it in minutes. Professional and highly efficient." },
                { t: "Transparent Tracking", d: "I love watching the progress bar on my dashboard move every day. It gives me peace of mind knowing exactly when my payout is due." },
                { t: "Fast and Easy", d: "From registration to my first withdrawal, the process was seamless. No complicated terms, just pure profit." },
                { t: "Retirement Booster", d: "As a retiree, I look for safe and steady growth. PrimeYieldNG provides exactly that with its institutional lending model." },
                { t: "Daily Motivation", d: "Waking up to see my earnings update every single morning is the best part of my day. This system really works." },
                { t: "Financial Freedom", d: "I started with a small amount and kept compounding. Today, I am debt-free thanks to this NG's amazing ROI." },
                { t: "Smooth Payouts", d: "No manual requests needed once it matures; the system is automated and very reliable. My bank alert came in within 2 hours." },
                { t: "Highly Recommended", d: "Told my colleagues at work about it, and we are all earning now. The referral bonus is a nice extra perk!" },
                { t: "Reliable Growth", d: "Consistency is everything. I've completed 5 full cycles now without a single day's delay. This is the gold standard." }
            ],
            moderate: [
                { t: "Good Service", d: "It works well, but sometimes the SMS alerts for deposits take a few minutes. Otherwise, 10/10." },
                { t: "Needs Darker Mode", d: "I love the profit, but please add a dark theme to the members area! My eyes hurt at night." },
                { t: "Support is Busy", d: "I had a question about lending cycles. Support took 4 hours to reply, but they were very helpful." },
                { t: "Withdrawal Window", d: "The payout isn't instant (took about 2 hours), but the money arrived safely. Just be patient after clicking withdraw." },
                { t: "KYC is Strict", d: "Make sure your bank name matches your profile name exactly, or they won't approve the payout. A bit strict but secure." },
                { t: "Referral Delay", d: "I invited my friend, but the bonus didn't show up for 10 hours. I thought it was a bug until I read the rules again." },
                { t: "Mobile View", d: "The dashboard is great on iPhone, but on my older Android, some of the charts look a bit squeezed. Still functional though." },
                { t: "Minimum Deposit", d: "I wish the minimum was ₦100 instead of ₦500, but I guess that wouldn't make much sense for the 10% daily model." },
                { t: "Bank Connectivity", d: "Had a small delay with my transfer using Kuda Bank. Switched to OPay and it was much faster. Worth noting for new users." },
                { t: "Security Logouts", d: "The site logs you out after a few minutes of inactivity for security. It's a bit annoying to keep re-entering the password, but safer I guess." },

                { t: "Chart Details", d: "The performance index shows 7 days of growth. I wish I could toggle it to see my total progress since I joined last month." },
                { t: "Payout Notifications", d: "I get the bank alert immediately, but the dashboard takes a few minutes to update the status to 'Success'. Just a minor sync delay." },
                { t: "Terms of Service", d: "The 2x maturation cap was confusing at first. I didn't realize it stops at 200%. Clearer explanation on the home page would help." },
                { t: "Weekend Support", d: "Sunday support is a bit slower than during the week. If you have an issue, try to message them on a Monday morning instead." }
            ],
            critical: [
                { t: "Confusing Lock", d: "I didn't realize I couldn't withdraw until it reached 2x. I need to read the terms better next time." },
                { t: "Withdrawal Delay", d: "My payout took almost the full 3 hours today. I was getting nervous, but the alert finally hit my bank." },
                { t: "Bank Mismatch", d: "My withdrawal was rejected because my bank account name didn't match my profile. It was my fault, but the error message was vague." },
                { t: "Referral Tracking", d: "It's not clear which of my friends actually deposited. I can see my bonus, but I want to see a list of my referrals." },
                { t: "Browser Support", d: "The dashboard looks a bit weird on Opera Mini. I had to switch to Chrome to see the performance chart properly." },
                { t: "Support Response", d: "I sent an email at 10 PM and didn't get a reply until the next morning. 24/7 live chat would be much better." },
                { t: "Network Issues", d: "The site was slow during peak hours today. Payout was still on time though." },
                { t: "Registration Problem", d: "The registration platform is of low-performance. I had to register multiple times before my account was created." },
                { t: "Password Reset", d: "Resetting my account password took nearly an hour to reflect. Make the process faster for forgetful users." },
                { t: "Captcha Issues", d: "The login verification code is sometimes very small. I had to refresh the page three times to get a readable one." },
                { t: "High Peak Lag", d: "The site lagged heavily when I was trying to deposit during the lunch break rush. Needs better servers." },
                { t: "Notification Delay", d: "There's a delay in receiving notifications about my transactions. It's a bit frustrating when I'm waiting for updates." },
                { t: "Profit Timing", d: "I wish the ROI updated at the same time for everyone. Waiting exactly 24 hours from my last deposit time is slightly annoying." },
                { t: "History Sorting", d: "The transaction history tab has no filter. It’s hard to find my first deposit now that I have so many ROI entries." },
                { t: "One account Policy", d: "I can only have one account, which is frustrating when I want to manage multiple investments." }
            ]
        };

        // 3. GENERATE 500+ VIRTUAL MEMBERS
        let allReviewsData = [];
        for (let i = 0; i < 500; i++) {
            let rand = seededRandom();
            let category, rating, sourcePool;

            if (rand > 0.4) {
                category = 'excellent'; rating = 5; sourcePool = sources.excellent;
            } else if (rand > 0.15) {
                category = 'moderate'; rating = 3.5; sourcePool = sources.moderate;
            } else {
                category = 'critical'; rating = 1.5; sourcePool = sources.critical;
            }

            let content = sourcePool[Math.floor(seededRandom() * sourcePool.length)];

            allReviewsData.push({
                id: i,
                name: names[i % names.length] + " " + String.fromCharCode(65 + (i % 26)) + ".",
                rating: rating,
                title: content.t,
                text: content.d,
                date: Math.floor(seededRandom() * 28) + " days ago",
                category: category,
                avatarColor: `hsl(${seededRandom() * 360}, 70%, 40%)`
            });
        }

        // 4. INFINITE SCROLL & FILTER LOGIC
        let activeDataset = [];
        let loadedCount = 0;
        const BATCH_SIZE = 9;
        const grid = document.getElementById('reviewsGrid');
        const statusText = document.getElementById('statusText');
        const loader = document.getElementById('loader');
        let scrollTriggerInstance;

        window.filterReviews = function (type) {
            // Toggle Buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerText.toLowerCase().includes(type) || (type === 'all' && btn.innerText.includes('All'))) {
                    btn.classList.add('active');
                }
            });

            // Filter Data
            activeDataset = (type === 'all') ? allReviewsData : allReviewsData.filter(r => r.category === type);

            // Reset Grid
            grid.innerHTML = '';
            loadedCount = 0;
            statusText.classList.add('hidden');
            loader.classList.remove('hidden');

            loadNextBatch();
            setupScrollTrigger();
        };

        function loadNextBatch() {
            if (loadedCount >= activeDataset.length) {
                statusText.classList.remove('hidden');
                loader.classList.add('hidden');
                if (scrollTriggerInstance) scrollTriggerInstance.kill();
                return;
            }

            const nextBatch = activeDataset.slice(loadedCount, loadedCount + BATCH_SIZE);
            const newCards = [];

            nextBatch.forEach(r => {
                const starStr = '★'.repeat(Math.floor(r.rating)) + (r.rating % 1 !== 0 ? '½' : '') + '☆'.repeat(5 - Math.ceil(r.rating));

                const card = document.createElement('div');
                card.className = 'review-card';
                card.innerHTML = `
                <div class="flex justify-between items-start mb-6">
                    <div class="flex items-center space-x-3">
                        <div class="avatar-ring" style="background:${r.avatarColor}; color:white;">
                            ${r.name.substring(0, 2)}
                        </div>
                        <div>
                            <h4 class="font-bold text-sm text-slate-900">${r.name}</h4>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">${r.date}</p>
                        </div>
                    </div>
                    <div class="rating-stars text-xs font-black stars-${r.category}">${starStr}</div>
                </div>
                <h5 class="font-extrabold text-slate-800 mb-2">${r.title}</h5>
                <p class="text-slate-500 text-sm leading-relaxed mb-6">"${r.text}"</p>
                <div class="flex items-center text-[10px] font-bold text-green-600 bg-green-50 px-2 py-1 rounded-md w-fit">
                    <i data-lucide="check-check" class="w-3 h-3 mr-1"></i> VERIFIED USER
                </div>
            `;
                grid.appendChild(card);
                newCards.push(card);
            });

            loadedCount += nextBatch.length;
            lucide.createIcons();

            // Staggered GSAP Entrance
            gsap.fromTo(newCards,
                { y: 30, opacity: 0 },
                { y: 0, opacity: 1, duration: 0.6, stagger: 0.1, ease: "power2.out" }
            );

            ScrollTrigger.refresh();
        }

        function setupScrollTrigger() {
            if (scrollTriggerInstance) scrollTriggerInstance.kill();
            scrollTriggerInstance = ScrollTrigger.create({
                trigger: "#sentinel",
                start: "top bottom",
                onEnter: () => setTimeout(loadNextBatch, 300)
            });
        }

        // Initialize
        filterReviews('all');
    });
</script>
</body>
